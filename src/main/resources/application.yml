server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 50
      min-spare: 10
    connection-timeout: 10s

pixelmosaic:
  model-path: classpath:models/u2netp.onnx
  max-concurrent: 2
  rate-limit-per-hour: 30
  behind-proxy: true
  max-image-bytes: 10485760
  max-pixels: 2000000
  chunk-size-bytes: 262144    # 256KB
  allowed-origins: "http://localhost:*,http://127.0.0.1:*,https://shreyasnandurkar.github.io"

logging:
  level:
    com.pixelmosaic: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
